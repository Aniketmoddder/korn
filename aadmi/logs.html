<!DOCTYPE html>
<html lang="en" class="dark selection:bg-[#8BE9FD] selection:text-[#050505]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KORN // TERMINAL LOGS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        void: '#030303', surface: '#0A0A0B', panel: 'rgba(20, 20, 22, 0.65)', borderline: 'rgba(255, 255, 255, 0.06)', 
                        cyan: { DEFAULT: '#8BE9FD', dim: 'rgba(139, 233, 253, 0.1)', glow: 'rgba(139, 233, 253, 0.5)' },
                        purple: { DEFAULT: '#BD93F9', dim: 'rgba(189, 147, 249, 0.1)' },
                        red: { DEFAULT: '#FF5555' }, emerald: { DEFAULT: '#50fa7b' },
                        text: { main: '#F4F4F5', muted: '#A1A1AA', dark: '#52525B' }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #030303; color: #F4F4F5; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        
        /* Shaders & Orbs */
        .shader-bg { position: fixed; inset: 0; z-index: -2; background-color: #030303; overflow: hidden; }
        .orb-1 { position: absolute; top: 10%; right: -10%; width: 40vw; height: 40vw; min-width: 300px; background: radial-gradient(circle, rgba(139,233,253,0.08) 0%, transparent 60%); animation: float-orb 20s ease-in-out infinite alternate; filter: blur(60px); }
        .orb-2 { position: absolute; bottom: 10%; left: -10%; width: 50vw; height: 50vw; min-width: 400px; background: radial-gradient(circle, rgba(189,147,249,0.06) 0%, transparent 60%); animation: float-orb 25s ease-in-out infinite alternate-reverse; filter: blur(60px); }
        @keyframes float-orb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-5%, 5%) scale(1.1); } }
        .noise-overlay { position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }

        /* UI Components */
        .glass-panel { background: var(--tw-colors-panel); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--tw-colors-borderline); box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.05), 0 8px 32px rgba(0,0,0,0.4); }
        .floating-nav { background: rgba(10, 10, 11, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .nav-item.active { color: #8BE9FD; background: rgba(139, 233, 253, 0.1); }
        .nav-item.active::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #8BE9FD; border-radius: 50%; box-shadow: 0 0 10px #8BE9FD; }

        /* =========================================
           🖥️ MATRIX TERMINAL STYLES
           ========================================= */
        .terminal-window {
            background-color: #010101; /* Deeper than void */
            border: 1px solid #1A1A1A;
            box-shadow: inset 0 0 30px rgba(0,0,0,1);
            position: relative;
            overflow: hidden;
        }
        /* CRT Scanline Effect */
        .terminal-window::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
        /* Terminal text scrollbar */
        #terminal-body::-webkit-scrollbar { display: block; width: 6px; }
        #terminal-body::-webkit-scrollbar-track { background: #010101; border-left: 1px solid #1A1A1A; }
        #terminal-body::-webkit-scrollbar-thumb { background: #1F1F22; }
        
        /* Log entry fade in */
        .log-entry { animation: fadeIn 0.3s ease-in forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* General Entrance */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .d-1 { animation-delay: 0.1s; } .d-2 { animation-delay: 0.2s; }
    </style>
</head>
<body class="flex h-screen overflow-hidden relative">

    <div class="shader-bg"><div class="orb-1"></div><div class="orb-2"></div></div>
    <div class="noise-overlay"></div>

    <header class="md:hidden fixed top-0 left-0 right-0 h-20 bg-gradient-to-b from-void to-transparent z-40 flex items-center justify-between px-6">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-cyan shadow-[0_0_12px_#8BE9FD] animate-pulse"></div>
            <span class="font-mono font-bold text-lg tracking-tighter">KORN<span class="text-cyan">.</span></span>
        </div>
        <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-cyan to-purple p-[1px]">
            <div class="w-full h-full rounded-full bg-surface flex items-center justify-center"><i data-lucide="user" class="w-4 h-4 text-text-main"></i></div>
        </div>
    </header>

    <nav class="md:hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 floating-nav rounded-full px-2 py-2 flex items-center gap-1 w-[90%] max-w-[340px] justify-between">
        <a href="index.html" class="nav-item relative p-3 rounded-full flex-1 flex justify-center text-text-muted hover:text-text-main transition-all duration-300">
            <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
        </a>
        <a href="tokens.html" class="nav-item relative p-3 rounded-full flex-1 flex justify-center text-text-muted hover:text-text-main transition-all duration-300">
            <i data-lucide="key" class="w-5 h-5"></i>
        </a>
        <a href="logs.html" class="nav-item active relative p-3 rounded-full flex-1 flex justify-center transition-all duration-300">
            <i data-lucide="terminal-square" class="w-5 h-5"></i>
        </a>
        <button class="nav-item relative p-3 rounded-full flex-1 flex justify-center text-text-muted hover:text-text-main transition-all duration-300">
            <i data-lucide="settings" class="w-5 h-5"></i>
        </button>
    </nav>

    <aside class="hidden md:flex flex-col w-64 h-full border-r border-borderline bg-void/40 backdrop-blur-xl relative z-30 pt-8 pb-6 justify-between">
        <div class="px-8">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-2 h-2 rounded-full bg-cyan shadow-[0_0_12px_#8BE9FD]"></div>
                <h1 class="font-mono font-bold text-xl tracking-tighter">KORN<span class="text-cyan">_</span>SYS</h1>
            </div>
            <div class="space-y-2">
                <p class="text-[10px] uppercase tracking-[0.2em] text-text-dark font-semibold mb-4">Core</p>
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-text-muted hover:text-text-main hover:bg-borderline rounded-xl transition-all font-medium">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
                </a>
                <a href="tokens.html" class="flex items-center gap-3 px-4 py-3 text-text-muted hover:text-text-main hover:bg-borderline rounded-xl transition-all font-medium">
                    <i data-lucide="key" class="w-4 h-4"></i> API Keys
                </a>
                <a href="logs.html" class="flex items-center gap-3 px-4 py-3 text-cyan bg-cyan-dim rounded-xl border border-cyan/20 transition-all font-medium">
                    <i data-lucide="terminal-square" class="w-4 h-4"></i> Live Logs
                </a>
            </div>
        </div>
    </aside>

    <main class="flex-1 h-full overflow-y-auto relative z-10 pt-24 pb-32 md:pt-0 md:pb-0 scroll-smooth">
        <div class="max-w-6xl mx-auto px-6 md:pt-12 flex flex-col h-full">
            
            <header class="flex flex-col sm:flex-row sm:items-end justify-between gap-6 mb-8 animate-in d-1 shrink-0">
                <div>
                    <p class="font-mono text-cyan text-xs mb-2 uppercase tracking-[0.2em] font-semibold flex items-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-cyan animate-pulse"></span> LIVE_FEED
                    </p>
                    <h2 class="text-4xl font-bold text-white tracking-tight leading-none">Terminal</h2>
                </div>
                <button onclick="clearLogs()" class="px-4 py-2 bg-void border border-borderline text-text-muted hover:text-red hover:border-red/30 rounded-lg transition-all flex items-center gap-2 justify-center text-xs font-mono">
                    <i data-lucide="trash-2" class="w-3 h-3"></i> Purge Logs
                </button>
            </header>

            <div class="glass-panel rounded-2xl flex-1 mb-10 flex flex-col animate-in d-2 overflow-hidden shadow-2xl min-h-[400px]">
                
                <div class="h-10 border-b border-borderline bg-void/50 flex items-center justify-between px-4 shrink-0">
                    <div class="flex gap-2">
                        <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                        <div class="w-3 h-3 rounded-full bg-emerald-500/80"></div>
                    </div>
                    <div class="font-mono text-[10px] text-text-dark uppercase tracking-widest">requests.log</div>
                    <div class="w-10"></div> </div>

                <div class="terminal-window flex-1 p-4 sm:p-6 overflow-y-auto relative font-mono text-[11px] sm:text-xs leading-relaxed" id="terminal-body">
                    <div class="text-text-dark mb-4">Initializing KORN_SYS log stream...<br>Connecting to endpoint... <span class="text-emerald">SUCCESS</span><br>Listening for incoming requests...</div>
                    
                    <div id="log-container" class="space-y-1">
                        </div>
                </div>
                
                <div class="h-8 border-t border-borderline bg-void/50 flex items-center justify-between px-4 shrink-0 font-mono text-[10px]">
                    <span class="text-text-muted flex items-center gap-2"><i data-lucide="activity" class="w-3 h-3 text-cyan"></i> Polling every 3s</span>
                    <span class="text-text-dark" id="log-count">0 ENTRIES</span>
                </div>
            </div>

        </div>
    </main>

    <script>
        lucide.createIcons();

        let previousLogCount = 0;
        const terminalBody = document.getElementById('terminal-body');
        const logContainer = document.getElementById('log-container');
        
        // Polling function to get live logs
        async function fetchLogs() {
            try {
                const response = await fetch('api-backend.php?action=get_logs');
                const data = await response.json();
                
                if (data.success) {
                    const currentCount = data.logs.length;
                    document.getElementById('log-count').textContent = `${currentCount} ENTRIES`;

                    // Only update DOM if new logs arrived
                    if (currentCount !== previousLogCount) {
                        renderLogs(data.logs);
                        previousLogCount = currentCount;
                        // Auto-scroll to bottom
                        terminalBody.scrollTop = terminalBody.scrollHeight;
                    }
                }
            } catch (err) {
                console.error("Connection lost...");
            }
        }

        function renderLogs(logs) {
            logContainer.innerHTML = ''; // Clear and rebuild (fast enough for 150 lines)
            
            logs.forEach((log) => {
                if (log.raw) {
                    // Weirdly formatted log line
                    logContainer.innerHTML += `<div class="text-text-dark log-entry">> ${log.raw}</div>`;
                    return;
                }

                // Color coding logic
                let statusColor = 'text-text-muted';
                let statusIcon = '>';
                
                if (log.status.includes('success')) {
                    statusColor = 'text-emerald shadow-emerald';
                    statusIcon = '[OK]';
                } else if (log.status.includes('failed') || log.status.includes('exceeded')) {
                    statusColor = 'text-red shadow-red';
                    statusIcon = '[ERR]';
                }

                // Shorten URL for display so it doesn't wrap horribly
                let displayUrl = log.url;
                if (displayUrl.length > 50) {
                    displayUrl = displayUrl.substring(0, 25) + '...' + displayUrl.substring(displayUrl.length - 20);
                }

                const html = `
                    <div class="log-entry flex flex-col sm:flex-row sm:gap-4 hover:bg-white/5 px-2 py-1 -mx-2 rounded transition-colors break-all sm:break-normal">
                        <span class="text-text-dark shrink-0 whitespace-nowrap">${log.time}</span>
                        <span class="text-cyan shrink-0 w-24">${log.token}</span>
                        <span class="text-text-muted flex-1 truncate" title="${log.url}">${displayUrl}</span>
                        <span class="${statusColor} shrink-0 w-28 text-right font-bold tracking-widest">${statusIcon} ${log.status.toUpperCase()}</span>
                    </div>
                `;
                logContainer.insertAdjacentHTML('beforeend', html);
            });
        }

        async function clearLogs() {
            if (!confirm("Wipe all system logs? This cannot be undone.")) return;
            try {
                await fetch('api-backend.php?action=clear_logs');
                logContainer.innerHTML = '<div class="text-cyan log-entry">> SYS_MSG: Logs purged by Administrator.</div>';
                previousLogCount = 0;
                document.getElementById('log-count').textContent = `0 ENTRIES`;
            } catch (err) {
                alert("Failed to clear logs.");
            }
        }

        // Initialize and setup interval
        document.addEventListener('DOMContentLoaded', () => {
            fetchLogs();
            // Poll the server every 3 seconds for that live "Matrix" feel
            setInterval(fetchLogs, 3000); 
        });
    </script>
</body>
</html>
