    <script>
        lucide.createIcons();

        // Greeting
        const hour = new Date().getHours();
        const greetingEl = document.getElementById('greeting');
        if (hour < 12) greetingEl.textContent = 'SYS_MSG: GOOD_MORNING';
        else if (hour < 18) greetingEl.textContent = 'SYS_MSG: LOGGED_IN';
        else greetingEl.textContent = 'SYS_MSG: NIGHT_SHIFT';

        // Copy Micro-interaction
        function copyEndpoint(event) {
            navigator.clipboard.writeText("https://awertgy453.serv00.net/korn/api/process.php");
            const icon = event.currentTarget.querySelector('i');
            icon.setAttribute('data-lucide', 'check');
            icon.classList.remove('text-text-dark', 'group-hover:text-cyan');
            icon.classList.add('text-emerald-400');
            lucide.createIcons();
            setTimeout(() => {
                icon.setAttribute('data-lucide', 'copy');
                icon.classList.remove('text-emerald-400');
                icon.classList.add('text-text-dark', 'group-hover:text-cyan');
                lucide.createIcons();
            }, 2000);
        }

        // Chart (Aesthetic styling)
        function initChart() {
            try {
                const canvas = document.getElementById('trafficChart');
                if(!canvas) return;
                const ctx = canvas.getContext('2d');
                
                let gradient = ctx.createLinearGradient(0, 0, 0, 300);
                gradient.addColorStop(0, 'rgba(139, 233, 253, 0.25)');
                gradient.addColorStop(1, 'rgba(139, 233, 253, 0)');

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['M', 'T', 'W', 'T', 'F', 'S', 'S'],
                        datasets: [{
                            data: [12, 19, 15, 25, 22, 30, 45],
                            borderColor: '#8BE9FD', backgroundColor: gradient, borderWidth: 3,
                            pointBackgroundColor: '#0A0A0B', pointBorderColor: '#8BE9FD', pointBorderWidth: 2, pointRadius: 5,
                            fill: true, tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false }, tooltip: { displayColors: false, backgroundColor: '#141416', titleFont: {family: 'JetBrains Mono'}, bodyFont: {family: 'JetBrains Mono'} } },
                        scales: {
                            x: { grid: { display: false }, ticks: { color: '#52525B', font: { family: 'JetBrains Mono' } } },
                            y: { border: { display: false }, grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#52525B', font: { family: 'JetBrains Mono' }, maxTicksLimit: 4 } }
                        }
                    }
                });
            } catch (e) { console.error("Chart failed:", e); }
        }

        // Fetch Data
        async function fetchDashboardStats() {
            try {
                const response = await fetch('api-backend.php?action=get_stats');
                const data = await response.json();
                
                if(data.success) {
                    animateValue("stat-requests", 0, data.stats.total_requests, 1000);
                    animateValue("stat-active", 0, data.stats.active_tokens, 800);
                    document.getElementById('stat-total').textContent = `/${data.stats.total_tokens}`;
                }
            } catch (error) {
                document.getElementById('stat-requests').textContent = 'ERR';
            }
        }

        function animateValue(id, start, end, duration) {
            if (start === end) { document.getElementById(id).textContent = end; return; }
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 4);
                document.getElementById(id).textContent = Math.floor(easeOut * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        // ==========================================
        // 🔐 CLERK INIT & SECURE REVEAL
        // ==========================================
        window.addEventListener("load", async function () {
            try {
                await window.Clerk.load({
                    appearance: { variables: { colorPrimary: '#8BE9FD' } }
                });

                if (window.Clerk.user) {
                    // Mount Avatar to Mobile and Desktop
                    window.Clerk.mountUserButton(document.getElementById('mobile-user-mount'));
                    window.Clerk.mountUserButton(document.getElementById('desktop-user-mount'));
                    
                    // Set Name in Sidebar
                    const adminName = document.getElementById('admin-name');
                    if(window.Clerk.user.firstName) {
                        adminName.textContent = window.Clerk.user.firstName;
                    }

                    // Reveal UI safely
                    const appContainer = document.getElementById('app-container');
                    appContainer.style.visibility = 'visible';
                    appContainer.style.opacity = '1';

                    // Start fetching API stats
                    fetchDashboardStats();
                    initChart();

                } else {
                    // Unauthorized - kick to landing page
                    window.location.href = '../index.html';
                }
            } catch (err) {
                console.error("Clerk Init Error:", err);
            }
        });
    </script>
